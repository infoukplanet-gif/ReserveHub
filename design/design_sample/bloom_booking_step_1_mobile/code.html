<style>
        body { font-family: 'Inter', 'Noto Sans JP', sans-serif; }

<body class="bg-surface text-on-surface min-h-screen pb-32">
<!-- Header (Shared Component: TopAppBar) -->
<header class="w-full top-0 sticky bg-white dark:bg-slate-900 border-b border-slate-200/50 z-50">
<div class="flex items-center h-16 px-4 w-full max-w-4xl mx-auto">
<button class="flex items-center justify-center w-10 h-10 rounded-full hover:bg-slate-50 transition-colors active:scale-95 duration-200">
<span class="material-symbols-outlined text-slate-900" data-icon="arrow_back">arrow_back</span>
</button>
<div class="ml-4 flex-1">
<h1 class="font-bold text-[22px] leading-[1.4] text-slate-900">Salon Relaxation</h1>
</div>
<div class="text-[13px] font-medium text-slate-500">BLOOM</div>
</div>
</header>
<!-- Stepper Unit -->
<nav class="bg-white px-4 py-6 border-b border-surface-container">
<div class="max-w-4xl mx-auto">
<div class="flex justify-between items-start">
<!-- Step 1 (Active) -->
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mb-2 step-active bg-primary-container/10">
<span class="text-sm font-bold">1</span>
</div>
<span class="text-[10px] sm:text-[11px] font-bold text-primary">メニュー</span>
</div>
<div class="flex-1 h-0.5 bg-surface-container mt-4"></div>
<!-- Step 2 -->
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mb-2 step-inactive">
<span class="text-sm font-bold">2</span>
</div>
<span class="text-[10px] sm:text-[11px] font-medium text-outline">スタッフ</span>
</div>
<div class="flex-1 h-0.5 bg-surface-container mt-4"></div>
<!-- Step 3 -->
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mb-2 step-inactive">
<span class="text-sm font-bold">3</span>
</div>
<span class="text-[10px] sm:text-[11px] font-medium text-outline">日時</span>
</div>
<div class="flex-1 h-0.5 bg-surface-container mt-4"></div>
<!-- Step 4 -->
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mb-2 step-inactive">
<span class="text-sm font-bold">4</span>
</div>
<span class="text-[10px] sm:text-[11px] font-medium text-outline">オプション</span>
</div>
<div class="flex-1 h-0.5 bg-surface-container mt-4"></div>
<!-- Step 5 -->
<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mb-2 step-inactive">
<span class="text-sm font-bold">5</span>
</div>
<span class="text-[10px] sm:text-[11px] font-medium text-outline">お客様情報</span>
</div>

<div class="flex flex-col items-center flex-1">
<div class="w-8 h-8 rounded-full border-2 flex items-center justify-center mb-2 step-inactive">

</div>
<span class="text-[10px] sm:text-[11px] font-medium text-outline">完了</span>
</div>
</div>

<main class="max-w-4xl mx-auto px-4 py-8">
<header class="mb-8">
<h2 class="text-2xl font-bold text-on-surface mb-2">メニューを選ぶ</h2>
<p class="text-on-surface-variant text-sm">ご希望の施術メニューを1つ選択してください。</p>
</header>
<!-- Category Tabs -->
<div class="flex gap-2 overflow-x-auto pb-4 mb-6 custom-scrollbar">
<button class="px-6 py-2.5 rounded-full bg-primary-container text-white text-sm font-semibold whitespace-nowrap">すべて</button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant text-sm font-medium whitespace-nowrap hover:bg-surface-container transition-colors">ボディケア</button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant text-sm font-medium whitespace-nowrap hover:bg-surface-container transition-colors">フットケア</button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant text-sm font-medium whitespace-nowrap hover:bg-surface-container transition-colors">ヘッドスパ</button>
<button class="px-6 py-2.5 rounded-full bg-surface-container-low text-on-surface-variant text-sm font-medium whitespace-nowrap hover:bg-surface-container transition-colors">オイルトリートメント</button>
</div>
<!-- Menu Cards Grid -->
<div class="grid grid-cols-1 md:grid-cols-2 gap-4">
<!-- Card 1 (Selected) -->
<label class="group relative block bg-surface-container-lowest border-2 border-primary rounded-xl p-6 transition-all cursor-pointer ring-4 ring-primary/5">
<input checked="" class="hidden" name="menu" type="radio"/>
<div class="flex justify-between items-start mb-4">
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-0.5 rounded-full bg-tertiary-fixed text-on-tertiary-fixed-variant text-[10px] font-bold uppercase tracking-wider">Recommended</span>
</div>
<h3 class="text-lg font-bold text-on-surface">全身もみほぐしコース</h3>
</div>
<div class="w-6 h-6 rounded-full border-2 border-primary flex items-center justify-center">
<div class="w-3 h-3 rounded-full bg-primary"></div>
</div>
</div>
<p class="text-on-surface-variant text-sm leading-relaxed mb-6">首から足裏まで、全身のコリを丁寧にほぐします。日々の疲れをリセットしたい方に最適なスタンダードコースです。</p>
<div class="flex items-end justify-between">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-lg mr-1" data-icon="schedule">schedule</span>
<span class="text-sm font-medium">60分</span>
</div>
<div class="text-right">
<span class="text-xs text-on-surface-variant block mb-px">税込価格</span>
<span class="text-2xl font-bold text-primary">¥6,600</span>
</div>
</div>
</label>
<!-- Card 2 -->
<label class="group relative block bg-surface-container-lowest border border-outline-variant rounded-xl p-6 transition-all cursor-pointer hover:border-primary/50 hover:shadow-lg">
<input class="hidden" name="menu" type="radio"/>
<div class="flex justify-between items-start mb-4">
<div class="flex-1">
<div class="flex items-center gap-2 mb-1">
<span class="px-2 py-0.5 rounded-full bg-surface-container-high text-on-surface-variant text-[10px] font-bold uppercase tracking-wider">Popular</span>
</div>
<h3 class="text-lg font-bold text-on-surface">アロマオイルリンパ</h3>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary/30 transition-colors">
</div>
</div>
<p class="text-on-surface-variant text-sm leading-relaxed mb-6">厳選されたオーガニックオイルを使用。リンパの流れを整え、デトックス効果と深いリラクゼーションを提供します。</p>
<div class="flex items-end justify-between">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-lg mr-1" data-icon="schedule">schedule</span>
<span class="text-sm font-medium">90分</span>
</div>
<div class="text-right">
<span class="text-xs text-on-surface-variant block mb-px">税込価格</span>
<span class="text-2xl font-bold text-on-surface">¥11,000</span>
</div>
</div>
</label>
<!-- Card 3 -->
<label class="group relative block bg-surface-container-lowest border border-outline-variant rounded-xl p-6 transition-all cursor-pointer hover:border-primary/50 hover:shadow-lg">
<input class="hidden" name="menu" type="radio"/>
<div class="flex justify-between items-start mb-4">
<div class="flex-1">
<h3 class="text-lg font-bold text-on-surface">ドライヘッドスパ</h3>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary/30 transition-colors">
</div>
</div>
<p class="text-on-surface-variant text-sm leading-relaxed mb-6">水を使わないヘッドマッサージ。眼精疲労や睡眠の質の改善に特化した、短時間でリフレッシュできるメニューです。</p>
<div class="flex items-end justify-between">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-lg mr-1" data-icon="schedule">schedule</span>
<span class="text-sm font-medium">45分</span>
</div>
<div class="text-right">
<span class="text-xs text-on-surface-variant block mb-px">税込価格</span>
<span class="text-2xl font-bold text-on-surface">¥5,500</span>
</div>
</div>
</label>
<!-- Card 4 -->
<label class="group relative block bg-surface-container-lowest border border-outline-variant rounded-xl p-6 transition-all cursor-pointer hover:border-primary/50 hover:shadow-lg">
<input class="hidden" name="menu" type="radio"/>
<div class="flex justify-between items-start mb-4">
<div class="flex-1">
<h3 class="text-lg font-bold text-on-surface">足裏・リフレクソロジー</h3>
</div>
<div class="w-6 h-6 rounded-full border-2 border-outline-variant flex items-center justify-center group-hover:border-primary/30 transition-colors">
</div>
</div>
<p class="text-on-surface-variant text-sm leading-relaxed mb-6">足裏の反射区を刺激し、内臓の活性化と冷え・むくみを解消。痛気持ちいい刺激がクセになる人気のフットケアです。</p>
<div class="flex items-end justify-between">
<div class="flex items-center text-on-surface-variant">
<span class="material-symbols-outlined text-lg mr-1" data-icon="schedule">schedule</span>
<span class="text-sm font-medium">40分</span>
</div>
<div class="text-right">
<span class="text-xs text-on-surface-variant block mb-px">税込価格</span>
<span class="text-2xl font-bold text-on-surface">¥4,800</span>
</div>
</div>
</label>
</div>

<div class="mt-8 p-4 bg-secondary-container/30 rounded-lg flex items-start gap-3">
<span class="material-symbols-outlined text-primary mt-0.5" data-icon="info">info</span>

                表示価格はすべて税込です。オプションメニュー（指名・延長・オイル変更など）は、次以降のステップで選択いただけます。
            </div>
</div>

<div class="flex flex-col">
<span class="text-xs text-on-surface-variant font-medium">合計金額</span>
<div class="flex items-baseline gap-1">
<span class="text-[28px] font-bold text-on-surface">¥6,600</span>
<span class="text-xs text-on-surface-variant">(税込)</span>
</div>
</div>
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-3.5 px-10 rounded-lg shadow-sm active:scale-[0.98] transition-all flex items-center gap-2">
<span>次へ進む</span>
<span class="material-symbols-outlined text-lg" data-icon="chevron_right">chevron_right</span>
</button>
</div>
</footer>

<div class="h-24 md:h-28"></div>
